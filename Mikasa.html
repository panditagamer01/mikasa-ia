<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikasa IA</title>

<style>
:root { --c1:#00fbff; --c2:#ff007f; }

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */
header{
position:absolute;
top:15px;
left:15px;
color:var(--c1);
font-weight:900;
letter-spacing:3px;
z-index:10;
}

/* ORB */
#top-visual{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
}

.orb{
width:130px;
height:130px;
border-radius:50%;
background: radial-gradient(circle at 30% 30%, var(--c1), var(--c2));
filter: blur(6px);
box-shadow:0 0 50px var(--c1);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:2;
}

.m{
max-width:80%;
padding:12px;
border-radius:15px;
}

.u{
align-self:flex-end;
background:#222;
}

.i{
align-self:flex-start;
background:#111;
border:1px solid #333;
}

/* INPUT */
.bar{
position:fixed;
bottom:0;
width:100%;
padding:10px;
background:#111;
display:flex;
gap:10px;
z-index:10;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#222;
color:#fff;
border-radius:20px;
}

button{
border:none;
cursor:pointer;
}

/* BOTONES */
.btn-plus{
font-size:26px;
background:none;
color:#888;
}

.btn-send{
background:var(--c1);
color:#000;
padding:10px 15px;
border-radius:10px;
}

/* MENU */
#menu{
position:fixed;
bottom:-200px;
width:100%;
background:#111;
display:grid;
grid-template-columns:repeat(4,1fr);
padding:15px;
transition:0.3s;
z-index:20;
}

#menu.show{
bottom:60px;
}

.m-item{
text-align:center;
font-size:12px;
}
</style>
</head>

<body onload="start()">

<header>MIKASA IA</header>

<div id="top-visual">
<div class="orb"></div>
</div>

<div id="chat"></div>

<!-- MENU -->
<div id="menu">
<div class="m-item">📷<br>Cámara</div>
<div class="m-item">🖼️<br>Galería</div>
<div class="m-item">📂<br>Archivos</div>
<div class="m-item">📍<br>Ubicación</div>
</div>

<!-- INPUT -->
<div class="bar">
<button class="btn-plus" onclick="toggleMenu()">+</button>
<input id="in" placeholder="Escribe..." onkeypress="if(event.key==='Enter') send()">
<button class="btn-send" onclick="send()">Enviar</button>
</div>

<script>

const API_KEY = "TU_API_KEY_AQUI"; // ⚠️

function start(){
responder("Hola, soy Mikasa. ¿Qué vamos a crear hoy?");
}

function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}

async function send(){
const input = document.getElementById("in");
const msg = input.value.trim();

if(!msg) return;

render(msg,"u");
input.value="";
toggleMenu(false);

try{

const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
contents:[{
parts:[{
text:`
Eres Mikasa IA.
Hablas amigable, un poco futurista y directa.
Respondes corto pero útil.

Usuario: ${msg}
`
}]
}]
})
});

const data = await res.json();

const reply =
data?.candidates?.[0]?.content?.parts?.[0]?.text ||
"No pude responder.";

responder(reply);

}catch(e){
render("Error con la IA o la API.","i");
}

}

function render(text,type){
const chat = document.getElementById("chat");

const div = document.createElement("div");
div.className = "m " + type;
div.innerText = text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

function responder(text){
render(text,"i");

const voz = new SpeechSynthesisUtterance(text);
voz.lang="es-ES";
speechSynthesis.speak(voz);
}

</script>

</body>
</html>
