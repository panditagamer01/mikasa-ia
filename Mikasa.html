<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa.ia | Sistema de Inteligencia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; text-align: center; color: #00fbff; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #111; }
        
        #visual-box { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .nebula {
            width: 180px; height: 180px;
            background: radial-gradient(circle, #ff007f, #00fbff);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0.5;
            transition: all 0.4s ease;
            animation: pulse 4s infinite;
        }
        .nebula.talking { transform: scale(1.4); opacity: 0.9; filter: blur(15px); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #chat {
            position: absolute; bottom: 80px; width: 100%; max-height: 250px;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 15px; }
        .bubble.user { background: #00fbff15; color: #00fbff; align-self: flex-end; border: 1px solid #00fbff33; }
        .bubble.ia { background: #ff007f15; color: #ff007f; align-self: flex-start; border: 1px solid #ff007f33; }

        .input-bar {
            padding: 15px; background: #0a0a0a; display: flex; gap: 10px; align-items: center;
            border-top: 1px solid #222; padding-bottom: 30px;
        }
        input {
            flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; 
            border-radius: 25px; color: #fff; outline: none;
        }
        .btn {
            background: linear-gradient(135deg, #00fbff, #ff007f);
            border: none; width: 50px; height: 50px; border-radius: 50%;
            color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body onclick="iniciar()">

    <header>mikasa.ia</header>
    
    <div id="visual-box">
        <div class="nebula" id="orb"></div>
        <div id="chat"></div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviar()">
        <button class="btn" onclick="escuchar()">🎤</button>
    </div>

    <script>
        // Truco para proteger la llave en GitHub
        const p1 = "AIzaSyAjIJqYxSMCqP1r3";
        const p2 = "-1g8WA5hArNs_zZt18";
        const API_KEY = p1 + p2; 

        let activo = false;
        let nombreUsuario = localStorage.getItem('user_name'); 

        function iniciar() {
            if(activo) return;
            activo = true;
            
            if(!nombreUsuario) {
                responder("Sistemas activos. No detecto un perfil registrado. ¿Cómo debo llamarte?");
            } else {
                responder(`Bienvenido de nuevo. Sistemas listos. ¿En qué puedo ayudarte hoy?`);
            }
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const texto = input.value.trim();
            if(!texto) return;

            renderMsg(texto, 'user');
            input.value = "";

            if(!nombreUsuario && (texto.toLowerCase().includes("soy") || texto.length < 20)) {
                nombreUsuario = texto.replace("Soy ", "").replace("soy ", "");
                localStorage.setItem('user_name', nombreUsuario);
                return responder(`Registro completado. Un placer, ${nombreUsuario}. ¿Qué vamos a crear hoy?`);
            }

            try {
                const promptFinal = nombreUsuario 
                    ? `Tu nombre es Mikasa. Eres una IA inteligente y carismática. Te diriges a tu usuario registrado como ${nombreUsuario}. Ayúdale con sus dudas de marketing digital o cualquier tema. Pregunta: ${texto}`
                    : `Tu nombre es Mikasa. Eres una IA inteligente y carismática. No conoces el nombre del usuario, así que sé formal y profesional. Pregunta: ${texto}`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptFinal }] }]
                    })
                });

                const data = await res.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;
                responder(respuestaIA);

            } catch (e) {
                responder("Hubo un error con la conexión. Verifica que tu llave esté activa.");
            }
        }

        function escuchar() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitRecognition;
            if (!SpeechRecognition) return responder("Navegador no compatible.");
            const rec = new SpeechRecognition();
            rec.lang = 'es-ES';
            rec.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                enviar();
            };
            rec.start();
        }

        function responder(t) {
            renderMsg(t, 'ia');
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-MX';
            u.onstart = () => document.getElementById('orb').classList.add('talking');
            u.onend = () => document.getElementById('orb').classList.remove('talking');
            window.speechSynthesis.speak(u);
        }

        function renderMsg(t, c) {
            const h = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `bubble ${c}`;
            d.innerText = t;
            h.appendChild(d);
            h.scrollTop = h.scrollHeight;
        }
    </script>
</body>
</html>
