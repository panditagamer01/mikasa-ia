<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikasa.ia</title>
    <style>
        :root { --c1: #00fbff; --c2: #ff007f; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Esfera Siri Centralizada */
        #top { flex: 0 0 160px; display: flex; justify-content: center; align-items: center; position: relative; }
        .orb {
            width: 110px; height: 110px;
            background: radial-gradient(circle at 30% 30%, var(--c1), var(--c2));
            border-radius: 50%; filter: blur(2px);
            box-shadow: 0 0 30px rgba(0,251,255,0.4);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .talking .orb { animation: wave 0.7s infinite alternate; box-shadow: 0 0 60px var(--c2); filter: blur(0px); }
        @keyframes wave { from { transform: scale(1); border-radius: 50%; } to { transform: scale(1.15); border-radius: 40% 60% 45% 55%; } }

        /* Chat Estilo Moderno */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .m { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; animation: in 0.3s ease; }
        @keyframes in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .u { align-self: flex-end; background: #222; border-bottom-right-radius: 4px; }
        .i { align-self: flex-start; background: rgba(0, 251, 255, 0.1); border: 1px solid rgba(0, 251, 255, 0.2); border-bottom-left-radius: 4px; }

        /* Barra de Entrada Blindada */
        .bar { padding: 15px 15px 35px; background: #000; border-top: 1px solid #222; }
        .card { background: #111; border: 1px solid #333; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 16px; }
        .btn { background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center; }
        .send { color: var(--c1); font-size: 24px; }
    </style>
</head>
<body onclick="start()">

    <div id="top"><div class="orb" id="orb"></div></div>
    <div id="chat"></div>

    <div class="bar">
        <div class="card">
            <button class="btn" style="color:#666; font-size:24px">+</button>
            <input type="text" id="in" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn" onclick="listen()" style="font-size:20px">🎤</button>
            <button class="btn send" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const KEY = "AIzaSyAjIJqYxSMCqP1r3" + "-1g8WA5hArNs_zZt18";
        let on = false;
        let user = localStorage.getItem('user_name');

        function start() {
            if(on) return; on = true;
            talk(user ? `Hola ${user}, estoy lista.` : "Sistemas activos. ¿En qué te ayudo?");
        }

        async function send() {
            const el = document.getElementById('in');
            const val = el.value.trim();
            if(!val) return;

            render(val, 'u');
            el.value = "";
            if(document.querySelectorAll('.m').length > 2) document.getElementById('top').style.flex = "0 0 80px";

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const d = await r.json();
                if(d.candidates && d.candidates[0].content) {
                    talk(d.candidates[0].content.parts[0].text);
                } else {
                    render("Error de respuesta. Revisa tu API Key.", "i");
                }
            } catch (e) {
                render("Sin conexión con el servidor.", "i");
            }
        }

        function talk(t) {
            render(t, 'i');
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(t);
            s.lang = 'es-MX';
            s.onstart = () => document.body.classList.add('talking');
            s.onend = () => document.body.classList.remove('talking');
            window.speechSynthesis.speak(s);
        }

        function render(t, c) {
            const h = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `m ${c}`;
            d.innerText = t;
            h.appendChild(d);
            h.scrollTop = h.scrollHeight;
        }

        function listen() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = 'es-ES';
            r.onresult = (e) => { document.getElementById('in').value = e.results[0][0].transcript; send(); };
            r.start();
        }
    </script>
</body>
</html>
