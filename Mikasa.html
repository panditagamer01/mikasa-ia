<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikasa IA</title>

<style>
:root { --c1:#00fbff; }

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

/* 🔥 ORB (YA NO BLOQUEA) */
#top-visual{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
z-index:0;
}

.orb{
width:120px;
height:120px;
border-radius:50%;
background: radial-gradient(circle, #00fbff, #ff007f);
filter: blur(6px);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* 🔥 CHAT ENCIMA */
#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
position:relative;
}

.m{
max-width:80%;
padding:10px;
border-radius:10px;
}

.u{ align-self:flex-end; background:#222; }
.i{ align-self:flex-start; background:#111; }

/* 🔥 INPUT (ARREGLADO) */
.bar{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#000;
border-top:1px solid #222;
z-index:9999; /* 🔥 CLAVE */
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#111;
color:#fff;
border-radius:10px;
}

/* BOTONES OSCUROS */
button{
background:#000;
color:var(--c1);
border:1px solid #222;
border-radius:10px;
padding:10px;
cursor:pointer;
}

/* MENU */
#menu{
position:fixed;
bottom:-200px;
width:100%;
background:#000;
display:grid;
grid-template-columns:repeat(4,1fr);
padding:10px;
transition:0.3s;
border-top:1px solid #222;
z-index:5000;
}

#menu.show{
bottom:60px;
}
</style>
</head>

<body>

<!-- ORB -->
<div id="top-visual"><div class="orb"></div></div>

<!-- CHAT -->
<div id="chat"></div>

<!-- MENU -->
<div id="menu">
<div>📷 Cámara</div>
<div>🖼️ Galería</div>
<div>📂 Archivos</div>
<div>📍 Ubicación</div>
</div>

<!-- INPUT -->
<div class="bar">
<button onclick="toggleMenu()">+</button>
<input id="in" placeholder="Escribe aquí..."
onkeydown="if(event.key==='Enter'){event.preventDefault();send();}">
<button onclick="send()">Enviar</button>
<button onclick="listen()">🎤</button>
</div>

<script>

const API_KEY = "TU_API_KEY_AQUI"; // ⚠️

// MENSAJE INICIAL
window.onload = () => {
  responder("Hola, soy Mikasa. ¿Qué vamos a crear hoy?");
};

// MENU +
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

// ENVIAR
async function send(){
  const input = document.getElementById("in");

  if(!input) return;

  const msg = input.value.trim();

  if(msg === "") return;

  render(msg,"u");
  input.value = "";

  try{

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{
          parts:[{
            text:`Eres Mikasa IA. Responde natural, clara y útil.\nUsuario: ${msg}`
          }]
        }]
      })
    });

    const data = await res.json();

    const reply =
    data?.candidates?.[0]?.content?.parts?.[0]?.text ||
    "No pude responder.";

    responder(reply);

  }catch(e){
    render("Error de conexión con la IA.", "i");
  }
}

// MICRÓFONO
function listen(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Tu navegador no soporta micrófono");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "es-ES";

  rec.onresult = (e) => {
    const texto = e.results[0][0].transcript;
    document.getElementById("in").value = texto;
  };

  rec.start();
}

// RENDER
function render(text,type){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "m " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// VOZ
function responder(text){
  render(text,"i");

  const voz = new SpeechSynthesisUtterance(text);
  voz.lang = "es-ES";

  speechSynthesis.cancel();
  speechSynthesis.speak(voz);
}

</script>

</body>
</html>
