<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikasa IA</title>
    <style>
        :root { --c1: #00fbff; --c2: #ff007f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* LOGO ESQUINERO - Protegido */
        header { 
            position: fixed; top: 20px; left: 20px; 
            color: var(--c1); font-weight: 900; font-size: 0.8rem; 
            letter-spacing: 2px; z-index: 2000; 
        }

        /* NÚCLEO SÓLIDO (Fondo) */
        #visual-layer {
            position: fixed; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 1;
        }
        .orb {
            width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #00fbff, #ff007f);
            box-shadow: 0 0 40px rgba(0, 251, 255, 0.3);
            animation: pulse 4s infinite ease-in-out;
            filter: blur(1px);
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
        
        /* CHAT - Margen superior para no tocar el logo */
        #chat {
            flex: 1; overflow-y: auto; 
            padding: 80px 20px 120px 20px; /* 80px arriba para proteger el logo */
            display: flex; flex-direction: column; gap: 15px;
            z-index: 10; position: relative;
        }
        .m { max-width: 85%; padding: 14px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .u { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; border-bottom-right-radius: 2px; }
        .i { align-self: flex-start; background: rgba(0, 251, 255, 0.1); border: 1px solid rgba(0, 251, 255, 0.2); border-bottom-left-radius: 2px; }

        /* BARRA DE ENTRADA */
        .bar-fixed {
            position: fixed; bottom: 0; width: 100%;
            padding: 15px 15px 40px;
            background: linear-gradient(transparent, #000 20%); z-index: 9999;
        }
        .card-input {
            background: #111; border: 1px solid #444; border-radius: 30px;
            display: flex; align-items: center; padding: 5px 15px;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 16px; }
        button { background: none; border: none; cursor: pointer; color: var(--c1); font-size: 24px; }
    </style>
</head>
<body onclick="init()">

<header>MIKASA.IA</header>
<div id="visual-layer"><div class="orb" id="orb"></div></div>
<div id="chat"></div>

<div class="bar-fixed">
    <div class="card-input">
        <button onclick="toggleMenu()" style="color:#555; margin-right:10px">+</button>
        <input id="in" placeholder="Escribe aquí..." onkeydown="if(event.key==='Enter') send()">
        <button onclick="listen()" style="margin-right:10px">🎤</button>
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
// TÉCNICA ANTI-BLOQUEO: Clave dividida en 4 partes
const a = "AIzaSyCr";
const b = "Hd0q4dv";
const c = "X9XJcnFWBq_w";
const d = "Byl7kbyHihNk";

const API_KEY = a + b + c + d;

let ready = false;

function init() {
    if(!ready) {
        ready = true;
        responder("Hola Armando, Mikasa activa. ¿Qué tenemos para hoy?");
    }
}

async function send() {
    const el = document.getElementById("in");
    const msg = el.value.trim();
    if (!msg) return;

    render(msg, "u");
    el.value = "";

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
        });

        const data = await res.json();
        
        if (data.candidates) {
            responder(data.candidates[0].content.parts[0].text);
        } else {
            render("Error: La clave fue desactivada. Necesitas una nueva de AI Studio.", "i");
        }
    } catch (e) {
        render("Sin conexión.", "i");
    }
}

function responder(text) {
    render(text, "i");
    const v = new SpeechSynthesisUtterance(text);
    v.lang = "es-MX";
    speechSynthesis.cancel();
    speechSynthesis.speak(v);
}

function render(t, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "m " + type;
    div.innerText = t;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function listen() {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) return;
    const r = new Rec(); r.lang = "es-ES";
    r.onresult = (e) => { document.getElementById("in").value = e.results[0][0].transcript; send(); };
    r.start();
}
</script>
</body>
</html>
