<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikasa IA</title>

<style>
:root { --c1:#00fbff; --c2:#ff007f; }

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

/* ORB */
#top-visual{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
}

.orb{
width:120px;
height:120px;
border-radius:50%;
background: radial-gradient(circle at 30% 30%, var(--c1), var(--c2));
filter: blur(5px);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* CHAT */
#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:2;
}

.m{
max-width:80%;
padding:10px;
border-radius:10px;
}

.u{
align-self:flex-end;
background:#222;
}

.i{
align-self:flex-start;
background:#111;
}

/* INPUT */
.bar{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#111;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#222;
color:#fff;
border-radius:10px;
}

button{
padding:10px;
border:none;
cursor:pointer;
}

/* MENU */
#menu{
position:fixed;
bottom:-200px;
width:100%;
background:#111;
display:grid;
grid-template-columns:repeat(4,1fr);
padding:10px;
transition:0.3s;
}

#menu.show{
bottom:60px;
}
</style>
</head>

<body>

<div id="top-visual"><div class="orb"></div></div>

<div id="chat"></div>

<div id="menu">
<div>📷 Cámara</div>
<div>🖼️ Galería</div>
<div>📂 Archivos</div>
<div>📍 Ubicación</div>
</div>

<div class="bar">
<button onclick="toggleMenu()">+</button>
<input id="in" placeholder="Escribe aquí...">
<button onclick="send()">Enviar</button>
<button onclick="listen()">🎤</button>
</div>

<script>

const API_KEY = "TU_API_KEY_AQUI"; // ⚠️

// 🔹 INICIO
window.onload = () => {
  responder("Hola, soy Mikasa. ¿Qué vamos a crear hoy?");
};

// 🔹 MENÚ
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

// 🔹 ENVIAR MENSAJE
async function send(){
  const input = document.getElementById("in");
  const msg = input.value.trim();

  if(!msg) return;

  render(msg,"u");
  input.value="";

  try{
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{
          parts:[{
            text: `Eres Mikasa IA. Responde claro, natural y corto.\nUsuario: ${msg}`
          }]
        }]
      })
    });

    const data = await res.json();

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text 
      || "No pude responder.";

    responder(reply);

  }catch(e){
    render("Error de conexión con la IA.", "i");
  }
}

// 🔹 VOZ
function listen(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Tu navegador no soporta micrófono");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "es-ES";

  rec.onresult = (e) => {
    const texto = e.results[0][0].transcript;
    document.getElementById("in").value = texto;
    send();
  };

  rec.start();
}

// 🔹 RENDER
function render(text,type){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "m " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔹 RESPONDER + VOZ
function responder(text){
  render(text,"i");

  const voz = new SpeechSynthesisUtterance(text);
  voz.lang = "es-ES";
  speechSynthesis.speak(voz);
}

</script>

</body>
</html>
