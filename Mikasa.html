<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikasa IA</title>

<style>
:root { --c1:#00fbff; --c2:#ff007f; --bg:#000; }

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:var(--bg);
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* LOGO */
header{
position:absolute;
top:15px;
left:15px;
color:var(--c1);
font-weight:900;
letter-spacing:3px;
font-size:0.9rem;
z-index:10;
}

/* ORB */
#top-visual{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
}

.orb{
width:140px;
height:140px;
border-radius:50%;
background: radial-gradient(circle at 30% 30%, var(--c1), var(--c2));
filter: blur(5px);
box-shadow:0 0 40px var(--c1);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:2;
}

.m{
max-width:80%;
padding:12px;
border-radius:15px;
font-size:14px;
}

.u{
align-self:flex-end;
background:#222;
}

.i{
align-self:flex-start;
background:#111;
border:1px solid #333;
}

/* INPUT */
.bar{
position:fixed;
bottom:0;
width:100%;
padding:10px;
background:#111;
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#222;
color:#fff;
border-radius:10px;
}

button{
padding:10px;
border:none;
background:var(--c1);
color:#000;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>MIKASA IA</header>

<div id="top-visual">
<div class="orb"></div>
</div>

<div id="chat"></div>

<div class="bar">
<input id="in" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">Enviar</button>
</div>

<script>

// ⚠️ SOLO PARA PRUEBAS (GitHub Pages)
const API_KEY = "PON_TU_API_KEY_AQUI";

async function send(){
const input = document.getElementById("in");
const msg = input.value.trim();

if(!msg) return;

render(msg,"u");
input.value="";

try{

const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
contents:[{
parts:[{
text:`
Eres Mikasa IA.
Respondes de forma natural, inteligente y clara.
No eres robótica.

Usuario: ${msg}
`
}]
}]
})
});

const data = await res.json();

const reply =
data?.candidates?.[0]?.content?.parts?.[0]?.text ||
"No pude responder.";

responder(reply);

}catch(e){
render("Error de conexión o API bloqueada.","i");
}

}

function render(text,type){
const chat = document.getElementById("chat");

const div = document.createElement("div");
div.className = "m " + type;
div.innerText = text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

function responder(text){
render(text,"i");

const voz = new SpeechSynthesisUtterance(text);
voz.lang="es-ES";
speechSynthesis.speak(voz);
}

</script>

</body>
</html>
