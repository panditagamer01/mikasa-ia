<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikasa IA Test</title>

<style>
:root { --c1:#00fbff; --c2:#ff007f; }
body { background:#000; color:#fff; font-family:sans-serif; margin:0; }

#chat { padding:20px; height:80vh; overflow:auto; }
.m { margin:10px 0; padding:10px; border-radius:10px; }
.u { background:#222; text-align:right; }
.i { background:#111; border:1px solid #333; }

input { width:70%; padding:10px; }
button { padding:10px; }
</style>
</head>

<body>

<div id="chat"></div>

<input id="in" placeholder="Escribe..." />
<button onclick="send()">Enviar</button>

<script>
const API_KEY = "TU_API_KEY_AQUI"; // ⚠️ SOLO PARA PRUEBAS

async function send(){
  const input = document.getElementById("in");
  const msg = input.value.trim();
  if(!msg) return;

  render(msg, "u");
  input.value = "";

  try{
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `
Eres Mikasa IA.
Hablas natural, inteligente y directa.
Respondes claro y con personalidad.

Usuario: ${msg}
`
            }]
          }]
        })
      }
    );

    const data = await res.json();

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text
      || "No hubo respuesta.";

    responder(reply);

  }catch(e){
    render("Error de conexión o API bloqueada", "i");
  }
}

function render(text, type){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "m " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function responder(text){
  render(text, "i");
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES";
  speechSynthesis.speak(u);
}
</script>

</body>
</html>
